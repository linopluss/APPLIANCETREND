<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinkMe 阳光橙配色方案</title>
    <style>
        :root {
            /* 主色系 */
            --primary: #FB6F04;
            --primary-dark: #E05A00;
            --primary-light: #FFF1E6;
            
            /* 功能色 */
            --error: #FF5252;
            --error-light: #FFF0F0;
            --warning: #FFC107;
            --warning-light: #FFF8E1;
            --success: #4CAF50;
            --success-light: #E8F5E9;
            
            /* 中性色 */
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --text-disabled: #B2BEC3;
            --background: #FFFFFF;
            --background-grey: #F9FAFB;
            --divider: #EAEAEA;
            --card-background: #FFFFFF;
            --overlay: rgba(0, 0, 0, 0.5);
            
            /* 投影 */
            --shadow-sm: 0 2px 8px rgba(251, 111, 4, 0.1);
            --shadow-md: 0 4px 12px rgba(251, 111, 4, 0.15);
            --shadow-lg: 0 8px 24px rgba(251, 111, 4, 0.2);
        }

        :root[data-theme="dark"] {
            /* 主色系保持不变 */
            --primary: #FB6F04;
            --primary-dark: #E05A00;
            --primary-light: #2D2318;
            
            /* 功能色调整 */
            --error: #FF5252;
            --error-light: #2D1F1F;
            --warning: #FFC107;
            --warning-light: #2D2718;
            --success: #4CAF50;
            --success-light: #1F2820;
            
            /* 中性色调整 */
            --text-primary: #F5F6F7;
            --text-secondary: #A0A4A8;
            --text-disabled: #636E72;
            --background: #121212;
            --background-grey: #1A1A1A;
            --divider: #2C2C2C;
            --card-background: #1E1E1E;
            --overlay: rgba(0, 0, 0, 0.75);
            
            /* 投影调整 */
            --shadow-sm: 0 2px 8px rgba(251, 111, 4, 0.2);
            --shadow-md: 0 4px 12px rgba(251, 111, 4, 0.25);
            --shadow-lg: 0 8px 24px rgba(251, 111, 4, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            padding: 20px;
            transition: all 0.3s ease;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 通用样式 */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        /* 卡片样式 */
        .card {
            background: var(--card-background);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--divider);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        /* 头像和基础信息 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: var(--primary);
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .location {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* 标签样式 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .tag:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        /* 按钮样式 */
        .button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: var(--primary-dark);
        }

        .button-secondary {
            background: var(--background-grey);
            color: var(--text-primary);
            border: 1px solid var(--divider);
        }

        .button-secondary:hover {
            background: var(--divider);
        }

        .button-danger {
            background: var(--error);
        }

        .button-warning {
            background: var(--warning);
        }

        .button-disabled {
            background: var(--text-disabled);
            cursor: not-allowed;
            opacity: 0.5;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 输入框样式 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--divider);
            border-radius: 12px;
            background: var(--background);
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .input:hover {
            border-color: var(--primary);
        }

        .input::placeholder {
            color: var(--text-secondary);
        }

        /* 警告框样式 */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid currentColor;
            transition: all 0.3s ease;
        }

        .alert:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .alert-error {
            color: var(--error);
            background: var(--error-light);
        }

        .alert-warning {
            color: var(--warning);
            background: var(--warning-light);
        }

        .alert-success {
            color: var(--success);
            background: var(--success-light);
        }

        /* 列表样式 */
        .list {
            background: var(--card-background);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--divider);
        }

        .list-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background-color: var(--background-grey);
            transform: translateX(4px);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        /* 徽章样式 */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid currentColor;
            transition: all 0.3s ease;
        }

        .badge:hover {
            transform: scale(1.05);
        }

        .badge-primary {
            color: var(--primary);
            background: var(--primary-light);
        }

        .badge-error {
            color: var(--error);
            background: var(--error-light);
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-disabled);
            transition: .4s;
            border-radius: 26px;
        }

        .switch-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .switch-slider {
            background-color: var(--primary);
        }

        input:checked + .switch-slider:before {
            transform: translateX(22px);
        }

        /* 颜色展示 */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 32px;
        }

        .color-item {
            padding: 16px;
            border-radius: 12px;
            background: var(--card-background);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--divider);
            transition: all 0.3s ease;
        }

        .color-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .color-box {
            height: 80px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .color-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .color-value {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .theme-status {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .mode-switch {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--divider);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-switch">
            <button onclick="toggleDarkMode()" id="themeToggle" class="button">切换暗黑/浅色模式</button>
            <div class="theme-status" id="themeStatus">当前模式：浅色</div>
        </div>

        <section class="section">
            <h2 class="section-title">阳光橙配色说明</h2>
            <div class="card">
                <p style="color: var(--text-secondary); margin-bottom: 16px;">
                    以充满活力的阳光橙为主色调，打造阳光活力的视觉体验：
                </p>
                <div class="tags">
                    <span class="tag">主色调：阳光橙</span>
                    <span class="tag">活力四射</span>
                    <span class="tag">朝气蓬勃</span>
                    <span class="tag">阳光明媚</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">登录框</h2>
            <div class="card">
                <div class="input-group">
                    <label class="input-label">手机号码</label>
                    <input type="tel" class="input" placeholder="请输入手机号码">
                </div>
                <div class="input-group">
                    <label class="input-label">验证码</label>
                    <input type="text" class="input" placeholder="请输入验证码">
                </div>
                <button class="button" style="width: 100%">登录</button>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">按钮样式</h2>
            <div class="buttons-grid">
                <button class="button">主要按钮</button>
                <button class="button button-secondary">次要按钮</button>
                <button class="button button-danger">危险按钮</button>
                <button class="button button-warning">警告按钮</button>
                <button class="button button-disabled">禁用按钮</button>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">提示框</h2>
            <div class="alert alert-error">
                错误提示：手机号码格式不正确
            </div>
            <div class="alert alert-warning">
                警告提示：您的会员即将到期
            </div>
            <div class="alert alert-success">
                成功提示：注册成功
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">列表样式</h2>
            <div class="list">
                <div class="list-item">
                    <div class="avatar" style="width: 48px; height: 48px;"></div>
                    <div style="flex: 1">
                        <div class="name" style="margin-bottom: 4px">张小姐</div>
                        <div class="location" style="margin-bottom: 0">刚刚活跃</div>
                    </div>
                    <span class="badge badge-primary">在线</span>
                </div>
                <div class="list-item">
                    <div class="avatar" style="width: 48px; height: 48px;"></div>
                    <div style="flex: 1">
                        <div class="name" style="margin-bottom: 4px">王先生</div>
                        <div class="location" style="margin-bottom: 0">10分钟前活跃</div>
                    </div>
                    <span class="badge badge-error">离线</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">配色方案</h2>
            <div class="color-grid">
                <div class="color-item">
                    <div class="color-box" style="background: var(--primary)"></div>
                    <div class="color-name">主色调</div>
                    <div class="color-value">#FB6F04</div>
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: var(--primary-dark)"></div>
                    <div class="color-name">深色变体</div>
                    <div class="color-value">#E05A00</div>
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: var(--primary-light)"></div>
                    <div class="color-name">浅色变体</div>
                    <div class="color-value">#FFF1E6 / #2D2318</div>
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: var(--success)"></div>
                    <div class="color-name">成功色</div>
                    <div class="color-value">#4CAF50</div>
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: var(--error)"></div>
                    <div class="color-name">错误色</div>
                    <div class="color-value">#FF5252</div>
                </div>
                <div class="color-item">
                    <div class="color-box" style="background: var(--text-primary)"></div>
                    <div class="color-name">主要文字</div>
                    <div class="color-value">#2D3436 / #F5F6F7</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const root = document.documentElement;
        const themeStatus = document.getElementById('themeStatus');

        function toggleDarkMode() {
            const isDark = root.getAttribute('data-theme') === 'dark';
            if (isDark) {
                root.removeAttribute('data-theme');
                themeStatus.textContent = '当前模式：浅色';
            } else {
                root.setAttribute('data-theme', 'dark');
                themeStatus.textContent = '当前模式：暗黑';
            }
        }

        // 检查系统主题
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            root.setAttribute('data-theme', 'dark');
            themeStatus.textContent = '当前模式：暗黑';
        }

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (e.matches) {
                root.setAttribute('data-theme', 'dark');
                themeStatus.textContent = '当前模式：暗黑';
            } else {
                root.removeAttribute('data-theme');
                themeStatus.textContent = '当前模式：浅色';
            }
        });
    </script>
</body>
</html>
